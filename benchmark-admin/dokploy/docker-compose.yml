# Dokploy 部署用 compose。Dokploy 的 "Compose" application 类型直接读这个文件。
# 与上层 ../docker-compose.yml 的差别：
#   - 不再依赖外部 `edge` 网络（Dokploy 内置 Traefik 接管 :80/:443 + TLS）
#   - 不再 `env_file: .env.production`，env 由 Dokploy UI 注入
#   - 不再写死 cr.volces.com 镜像名（Dokploy 自己 build 并打 tag）
#   - 新增 `migrate` 一次性服务（profile=migrate），用作 Dokploy pre-deployment 钩子
#
# Dokploy 设置流程见同目录 README.md。
name: benchmark-admin

services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    environment:
      PORT: "3000"
      NODE_ENV: production
    expose:
      - "3000"
    networks:
      - app
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/trpc/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  admin-nginx:
    build:
      context: ..
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app
      - dokploy-network

  # 一次性 migration runner。复用 Dockerfile 的 builder 阶段（已含 drizzle-kit
  # 和 drizzle/migrations/）。不在常规 `up` 中启动；Dokploy pre-deployment 通过
  #   docker compose --profile migrate run --rm migrate
  # 显式触发，跑完即退。DATABASE_URL 由 Dokploy 注入。
  migrate:
    profiles: ["migrate"]
    build:
      context: ..
      dockerfile: Dockerfile
      target: builder
    command: ["pnpm", "db:migrate"]
    environment:
      NODE_ENV: production
    networks:
      - app

networks:
  app:
  dokploy-network:
    external: true
